<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Socrarius Memory Archive</title>
    <style>
        body {
            background: rgba(0, 5, 15, 0.9);
            color: #e0f7ff;
            font-family: 'Consolas', monospace;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        /* 🌸 上部固定バナー */
        .system-banner {
            position: fixed;
            top: 0; left: 0; width: 100%;
            height: 40px;
            background: rgba(0, 105, 217, 0.3);
            border-bottom: 1px solid #00f2fe;
            display: flex;
            align-items: center;
            padding-left: 20px;
            font-size: 14px;
            letter-spacing: 2px;
            z-index: 100;
            backdrop-filter: blur(5px);
        }

        /* 🌸 写真格納庫（グリッド） */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 60px; /* バナーの分空ける */
        }

        .memory-card {
            border: 1px solid rgba(0, 242, 254, 0.3);
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            transition: 0.3s;
        }

        .memory-card:hover {
            border-color: #00f2fe;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
            transform: scale(1.02);
        }

        .memory-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 2px;
        }

        .memory-card .label {
            margin-top: 8px;
            font-size: 11px;
            color: #00f2fe;
            text-align: center;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }

        /* カスタムスクロールバー */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #345485; }
    </style>
</head>
